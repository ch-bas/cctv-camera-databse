# Camera: Reolink RLC-823A
# Tested firmware: v3.1.0
# Contributor: maintainer (seed config)

cameras:
  front_yard:
    ffmpeg:
      inputs:
        - path: rtsp://{user}:{pass}@{ip}:554/h264Preview_01_main
          roles: [record]
        - path: rtsp://{user}:{pass}@{ip}:554/h264Preview_01_sub
          roles: [detect]
    detect:
      width: 640
      height: 480
      fps: 5

# Notes:
# - Main stream: 4K 3840x2160 @ 25fps (use for recording only)
# - Sub stream: set to 640x480 in camera settings for optimal Frigate detect performance
# - RTSP must be enabled in camera settings (Network > Advanced > Port Settings)
# - ONVIF also available on port 8000
# - Camera supports both H.264 and H.265; Frigate works best with H.264 sub-stream
